<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>

    <!-- Blob gradient -->
    <radialGradient id="blobGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f7ff;stop-opacity:0.85"/>
      <stop offset="55%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff2d78;stop-opacity:0.7"/>
    </radialGradient>

    <!-- Glow filter for blob -->
    <filter id="blobGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft glow for particles -->
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Star shape -->
    <polygon id="star" points="0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8" fill="#00f7ff"/>

    <!-- Clip for whole SVG -->
    <clipPath id="svgClip">
      <rect width="900" height="280"/>
    </clipPath>

  </defs>

  <g clip-path="url(#svgClip)">

    <!-- Background -->
    <rect width="900" height="280" fill="url(#bgGrad)"/>

    <!-- Grid lines subtle -->
    <g stroke="#00f7ff" stroke-opacity="0.04" stroke-width="1">
      <line x1="0" y1="46" x2="900" y2="46"/>
      <line x1="0" y1="93" x2="900" y2="93"/>
      <line x1="0" y1="140" x2="900" y2="140"/>
      <line x1="0" y1="187" x2="900" y2="187"/>
      <line x1="0" y1="234" x2="900" y2="234"/>
      <line x1="150" y1="0" x2="150" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
      <line x1="450" y1="0" x2="450" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="750" y1="0" x2="750" y2="280"/>
    </g>

    <!-- Animated blob behind text -->
    <ellipse cx="450" cy="138" rx="110" ry="90" fill="url(#blobGrad)" filter="url(#blobGlow)" opacity="0.75">
      <animate attributeName="rx" values="110;130;105;125;110" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="90;80;100;85;90" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.75;0.9;0.7;0.85;0.75" dur="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 450 138" to="360 450 138" dur="18s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Second blob accent -->
    <ellipse cx="450" cy="138" rx="70" ry="55" fill="#ff2d78" opacity="0.18" filter="url(#blobGlow)">
      <animate attributeName="rx" values="70;55;75;60;70" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="55;70;50;65;55" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360 450 138" to="0 450 138" dur="10s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Floating PARTICLES -->

    <!-- Cyan dots -->
    <circle cx="80" cy="60" r="3" fill="#00f7ff" filter="url(#particleGlow)" opacity="0.9">
      <animate attributeName="cy" values="60;40;65;45;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.8;0.4;0.9" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="80" r="2.5" fill="#00f7ff" filter="url(#particleGlow)" opacity="0.8">
      <animate attributeName="cy" values="80;60;85;65;80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.7;0.3;0.8" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="200" r="2" fill="#00f7ff" filter="url(#particleGlow)" opacity="0.7">
      <animate attributeName="cy" values="200;185;205;188;200" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="210" r="3" fill="#00f7ff" filter="url(#particleGlow)" opacity="0.8">
      <animate attributeName="cy" values="210;195;215;198;210" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="150" r="2" fill="#a855f7" filter="url(#particleGlow)" opacity="0.7">
      <animate attributeName="cy" values="150;135;155;138;150" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="170" r="2.5" fill="#a855f7" filter="url(#particleGlow)" opacity="0.7">
      <animate attributeName="cy" values="170;155;175;158;170" dur="5.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Pink dots -->
    <circle cx="200" cy="50" r="2.5" fill="#ff2d78" filter="url(#particleGlow)" opacity="0.8">
      <animate attributeName="cy" values="50;35;55;38;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.7;0.4;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="55" r="2" fill="#ff2d78" filter="url(#particleGlow)" opacity="0.7">
      <animate attributeName="cy" values="55;40;60;42;55" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="230" r="3" fill="#ff2d78" filter="url(#particleGlow)" opacity="0.6">
      <animate attributeName="cy" values="230;215;235;218;230" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="240" r="2" fill="#ff2d78" filter="url(#particleGlow)" opacity="0.7">
      <animate attributeName="cy" values="240;225;245;228;240" dur="4.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Star sparkles -->
    <g filter="url(#particleGlow)">
      <use href="#star" transform="translate(100,110)" fill="#00f7ff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.9;0.2;0.8" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 100 110" to="360 100 110" dur="4s" additive="sum" repeatCount="indefinite"/>
      </use>
      <use href="#star" transform="translate(800,120)" fill="#ff2d78" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.1;0.8;0.15;0.7" dur="3.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 800 120" to="360 800 120" dur="5s" additive="sum" repeatCount="indefinite"/>
      </use>
      <use href="#star" transform="translate(240,240)" fill="#a855f7" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.1;0.7;0.2;0.6" dur="4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 240 240" to="360 240 240" dur="6s" additive="sum" repeatCount="indefinite"/>
      </use>
      <use href="#star" transform="translate(660,240)" fill="#00f7ff" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.15;0.8;0.1;0.7" dur="2.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 660 240" to="360 660 240" dur="4.5s" additive="sum" repeatCount="indefinite"/>
      </use>
      <use href="#star" transform="translate(450,28)" fill="#ffe600" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.2;1;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" from="0 450 28" to="360 450 28" dur="3s" additive="sum" repeatCount="indefinite"/>
      </use>
    </g>

    <!-- Floating rings -->
    <circle cx="310" cy="90" r="18" fill="none" stroke="#00f7ff" stroke-width="1.2" opacity="0.25">
      <animate attributeName="r" values="18;22;17;21;18" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.08;0.3;0.1;0.25" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="190" r="14" fill="none" stroke="#ff2d78" stroke-width="1" opacity="0.25">
      <animate attributeName="r" values="14;18;13;17;14" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.08;0.28;0.1;0.25" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="148" r="10" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.2">
      <animate attributeName="r" values="10;14;9;13;10" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="138" r="12" fill="none" stroke="#00f7ff" stroke-width="1" opacity="0.2">
      <animate attributeName="r" values="12;16;11;15;12" dur="5.5s" repeatCount="indefinite"/>
    </circle>

    <!-- MAIN NAME TEXT with glow -->
    <text
      x="450" y="148"
      text-anchor="middle"
      font-family="'Segoe UI', 'Arial Black', sans-serif"
      font-size="72"
      font-weight="900"
      letter-spacing="-2"
      fill="white"
      filter="url(#textGlow)"
      opacity="0">
      Biltu Bag
      <animate attributeName="opacity" values="0;0;1" dur="1.2s" fill="freeze"/>
    </text>

    <!-- Cyan outline duplicate for cartoon effect -->
    <text
      x="450" y="148"
      text-anchor="middle"
      font-family="'Segoe UI', 'Arial Black', sans-serif"
      font-size="72"
      font-weight="900"
      letter-spacing="-2"
      fill="none"
      stroke="#00f7ff"
      stroke-width="1.5"
      opacity="0">
      Biltu Bag
      <animate attributeName="opacity" values="0;0;0.35" dur="1.5s" fill="freeze"/>
      <animate attributeName="stroke-opacity" values="0.35;0.1;0.4;0.15;0.35" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </text>

    <!-- Subtitle -->
    <text
      x="450" y="188"
      text-anchor="middle"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="15"
      font-weight="500"
      fill="#cbd5e1"
      letter-spacing="1"
      opacity="0">
      ⚡ Full Stack Developer | DSA Learner | Open Source ⚡
      <animate attributeName="opacity" values="0;0;0;0.9" dur="2s" fill="freeze"/>
    </text>

    <!-- Animated underline bar under name -->
    <rect x="350" y="158" width="0" height="2.5" rx="2" fill="url(#blobGrad)" opacity="0.9">
      <animate attributeName="width" values="0;200" dur="1s" begin="1.2s" fill="freeze"/>
      <animate attributeName="x" values="450;350" dur="1s" begin="1.2s" fill="freeze"/>
    </rect>

    <!-- Corner decorations -->
    <g stroke="#00f7ff" stroke-width="1.5" fill="none" opacity="0.4">
      <polyline points="20,20 20,40 40,40"/>
      <polyline points="880,20 880,40 860,40"/>
      <polyline points="20,260 20,240 40,240"/>
      <polyline points="880,260 880,240 860,240"/>
    </g>

  </g>
</svg>
