<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Dark bg gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#020917"/>
      <stop offset="100%" stop-color="#071426"/>
    </linearGradient>

    <!-- Cyan-pink blob gradient -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Secondary blob -->
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d78" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f7ff" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-star" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip -->
    <clipPath id="clip"><rect width="900" height="300" rx="0"/></clipPath>

    <!-- Orbit gradient stroke -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00f7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <g clip-path="url(#clip)">

    <!-- BG -->
    <rect width="900" height="300" fill="url(#bg)"/>

    <!-- Subtle dot grid -->
    <g fill="#00f7ff" fill-opacity="0.06">
      <circle cx="75"  cy="50"  r="1"/><circle cx="225" cy="50"  r="1"/><circle cx="375" cy="50"  r="1"/>
      <circle cx="525" cy="50"  r="1"/><circle cx="675" cy="50"  r="1"/><circle cx="825" cy="50"  r="1"/>
      <circle cx="75"  cy="100" r="1"/><circle cx="225" cy="100" r="1"/><circle cx="375" cy="100" r="1"/>
      <circle cx="525" cy="100" r="1"/><circle cx="675" cy="100" r="1"/><circle cx="825" cy="100" r="1"/>
      <circle cx="75"  cy="150" r="1"/><circle cx="225" cy="150" r="1"/><circle cx="375" cy="150" r="1"/>
      <circle cx="525" cy="150" r="1"/><circle cx="675" cy="150" r="1"/><circle cx="825" cy="150" r="1"/>
      <circle cx="75"  cy="200" r="1"/><circle cx="225" cy="200" r="1"/><circle cx="375" cy="200" r="1"/>
      <circle cx="525" cy="200" r="1"/><circle cx="675" cy="200" r="1"/><circle cx="825" cy="200" r="1"/>
      <circle cx="75"  cy="250" r="1"/><circle cx="225" cy="250" r="1"/><circle cx="375" cy="250" r="1"/>
      <circle cx="525" cy="250" r="1"/><circle cx="675" cy="250" r="1"/><circle cx="825" cy="250" r="1"/>
    </g>

    <!-- BIG GLOW BLOB CENTER -->
    <ellipse cx="450" cy="148" rx="160" ry="110" fill="url(#blob1)" filter="url(#glow-soft)">
      <animate attributeName="rx" values="160;180;150;175;160" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="110;95;120;100;110" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0 450 148" to="360 450 148" dur="20s" repeatCount="indefinite"/>
    </ellipse>

    <!-- SECONDARY GLOW -->
    <ellipse cx="450" cy="148" rx="80" ry="60" fill="url(#blob2)" filter="url(#glow-soft)">
      <animate attributeName="rx" values="80;60;90;65;80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="60;80;55;75;60" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360 450 148" to="0 450 148" dur="12s" repeatCount="indefinite"/>
    </ellipse>

    <!-- ORBIT RINGS -->
    <!-- Orbit 1 -->
    <ellipse cx="450" cy="148" rx="200" ry="55" fill="none" stroke="#00f7ff" stroke-width="0.6" stroke-opacity="0.18" stroke-dasharray="6 4">
      <animateTransform attributeName="transform" type="rotate" from="0 450 148" to="360 450 148" dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Orbit 2 -->
    <ellipse cx="450" cy="148" rx="230" ry="38" fill="none" stroke="#ff2d78" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" from="360 450 148" to="0 450 148" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Orbit 3 -->
    <ellipse cx="450" cy="148" rx="260" ry="25" fill="none" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.12" stroke-dasharray="3 10">
      <animateTransform attributeName="transform" type="rotate" from="0 450 148" to="360 450 148" dur="22s" repeatCount="indefinite"/>
    </ellipse>

    <!-- ORBITING DOT on ring 1 -->
    <circle r="4" fill="#00f7ff" filter="url(#glow-cyan)" opacity="0.9">
      <animateMotion dur="14s" repeatCount="indefinite">
        <mpath href="#orbit1path"/>
      </animateMotion>
    </circle>
    <path id="orbit1path" d="M 450,148 m -200,0 a 200,55 0 1,1 0.01,0" fill="none"/>

    <!-- ORBITING DOT on ring 2 -->
    <circle r="3" fill="#ff2d78" filter="url(#glow-cyan)" opacity="0.85">
      <animateMotion dur="18s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
        <mpath href="#orbit2path"/>
      </animateMotion>
    </circle>
    <path id="orbit2path" d="M 450,148 m -230,0 a 230,38 0 1,1 0.01,0" fill="none"/>

    <!-- ORBITING DOT on ring 3 -->
    <circle r="2.5" fill="#a78bfa" filter="url(#glow-cyan)" opacity="0.8">
      <animateMotion dur="22s" repeatCount="indefinite">
        <mpath href="#orbit3path"/>
      </animateMotion>
    </circle>
    <path id="orbit3path" d="M 450,148 m -260,0 a 260,25 0 1,1 0.01,0" fill="none"/>

    <!-- FLOATING PARTICLES -->
    <!-- Left cluster -->
    <circle cx="60" cy="80" r="2.5" fill="#00f7ff" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0.7;0" dur="4s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="cy" values="80;60;82;62;80" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="230" r="2" fill="#ff2d78" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0;0.6;0" dur="5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="cy" values="230;212;232;214;230" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="170" r="1.5" fill="#a78bfa" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0;0.5;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="cy" values="170;155;172;157;170" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Right cluster -->
    <circle cx="840" cy="70" r="2.5" fill="#00f7ff" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0;0.7;0" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="cy" values="70;50;72;52;70" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="870" cy="200" r="2" fill="#ff2d78" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0;0.6;0" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="cy" values="200;182;202;184;200" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="240" r="1.5" fill="#a78bfa" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0;0.5;0" dur="4.2s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="cy" values="240;222;242;224;240" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Top scattered -->
    <circle cx="300" cy="30" r="2" fill="#00f7ff" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0;0.6;0" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="600" cy="25" r="1.8" fill="#ff2d78" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0;0.5;0" dur="3.6s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    <circle cx="200" cy="270" r="2" fill="#00f7ff" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0;0.6;0" dur="4s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="700" cy="275" r="2" fill="#a78bfa" filter="url(#glow-star)" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0;0.6;0" dur="4.8s" repeatCount="indefinite" begin="1.2s"/>
    </circle>

    <!-- SPARKLE STARS (4-point) -->
    <g filter="url(#glow-star)">
      <!-- top left star -->
      <g opacity="0" transform="translate(140,55)">
        <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0s"/>
        <animateTransform attributeName="transform" type="rotate" from="0 140 55" to="360 140 55" dur="3s" repeatCount="indefinite" additive="sum"/>
        <polygon points="0,-7 1.5,-1.5 7,0 1.5,1.5 0,7 -1.5,1.5 -7,0 -1.5,-1.5" fill="#00f7ff"/>
      </g>
      <!-- top right star -->
      <g opacity="0" transform="translate(760,48)">
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
        <animateTransform attributeName="transform" type="rotate" from="360 760 48" to="0 760 48" dur="4s" repeatCount="indefinite" additive="sum"/>
        <polygon points="0,-6 1.3,-1.3 6,0 1.3,1.3 0,6 -1.3,1.3 -6,0 -1.3,-1.3" fill="#ff2d78"/>
      </g>
      <!-- bottom left star -->
      <g opacity="0" transform="translate(170,248)">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
        <animateTransform attributeName="transform" type="rotate" from="0 170 248" to="360 170 248" dur="5s" repeatCount="indefinite" additive="sum"/>
        <polygon points="0,-5 1.1,-1.1 5,0 1.1,1.1 0,5 -1.1,1.1 -5,0 -1.1,-1.1" fill="#a78bfa"/>
      </g>
      <!-- bottom right star -->
      <g opacity="0" transform="translate(730,252)">
        <animate attributeName="opacity" values="0;0.9;0" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
        <animateTransform attributeName="transform" type="rotate" from="0 730 252" to="360 730 252" dur="3.5s" repeatCount="indefinite" additive="sum"/>
        <polygon points="0,-6 1.3,-1.3 6,0 1.3,1.3 0,6 -1.3,1.3 -6,0 -1.3,-1.3" fill="#00f7ff"/>
      </g>
      <!-- top center star -->
      <g opacity="0" transform="translate(450,22)">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.4s"/>
        <animateTransform attributeName="transform" type="rotate" from="0 450 22" to="360 450 22" dur="2.5s" repeatCount="indefinite" additive="sum"/>
        <polygon points="0,-8 1.7,-1.7 8,0 1.7,1.7 0,8 -1.7,1.7 -8,0 -1.7,-1.7" fill="#ffe600"/>
      </g>
    </g>

    <!-- CORNER TECH BRACKETS -->
    <g stroke="#00f7ff" stroke-width="1.8" fill="none" stroke-opacity="0.5">
      <polyline points="16,16 16,42 42,42"/>
      <polyline points="884,16 884,42 858,42"/>
      <polyline points="16,284 16,258 42,258"/>
      <polyline points="884,284 884,258 858,258"/>
    </g>
    <!-- Inner corner dots -->
    <circle cx="42" cy="42" r="2" fill="#00f7ff" opacity="0.6"/>
    <circle cx="858" cy="42" r="2" fill="#00f7ff" opacity="0.6"/>
    <circle cx="42" cy="258" r="2" fill="#00f7ff" opacity="0.6"/>
    <circle cx="858" cy="258" r="2" fill="#00f7ff" opacity="0.6"/>

    <!-- HORIZONTAL SCAN LINE (moves top to bottom) -->
    <rect x="0" y="0" width="900" height="1.5" fill="url(#orbitGrad)" opacity="0.5">
      <animate attributeName="y" values="-2;302;-2" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.5;0.6;0" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- MAIN NAME - shadow layer -->
    <text x="450" y="152" text-anchor="middle"
      font-family="'Arial Black', 'Helvetica Neue', sans-serif"
      font-size="76" font-weight="900" letter-spacing="-3"
      fill="none" stroke="#00f7ff" stroke-width="1" stroke-opacity="0">
      Biltu Bag
      <animate attributeName="stroke-opacity" values="0;0;0.25;0.12;0.28;0.1;0.25" dur="4s" begin="1s" repeatCount="indefinite"/>
    </text>

    <!-- MAIN NAME - white fill, fade in -->
    <text x="450" y="152" text-anchor="middle"
      font-family="'Arial Black', 'Helvetica Neue', sans-serif"
      font-size="76" font-weight="900" letter-spacing="-3"
      fill="white" filter="url(#glow-text)" opacity="0">
      Biltu Bag
      <animate attributeName="opacity" values="0;0;1" dur="1.4s" fill="freeze"/>
    </text>

    <!-- ANIMATED UNDERLINE -->
    <rect x="450" y="163" width="0" height="3" rx="2" fill="#00f7ff" opacity="0.85">
      <animate attributeName="width" values="0;220" dur="0.9s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.25,0.1,0.25,1"/>
      <animate attributeName="x" values="450;340" dur="0.9s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.25,0.1,0.25,1"/>
    </rect>
    <!-- Underline pink accent -->
    <rect x="450" y="163" width="0" height="3" rx="2" fill="#ff2d78" opacity="0.6">
      <animate attributeName="width" values="0;80" dur="0.6s" begin="2s" fill="freeze"/>
      <animate attributeName="x" values="450;560" dur="0.6s" begin="2s" fill="freeze"/>
    </rect>

    <!-- SUBTITLE fade in -->
    <text x="450" y="200" text-anchor="middle"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="14.5" font-weight="400" letter-spacing="2.5"
      fill="#94a3b8" opacity="0">
      ⚡  FULL STACK DEVELOPER  ·  DSA LEARNER  ·  OPEN SOURCE  ⚡
      <animate attributeName="opacity" values="0;0;0;0.88" dur="2.2s" fill="freeze"/>
    </text>

    <!-- TECH PILLS row -->
    <!-- JS pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1" dur="2.8s" fill="freeze"/>
      <rect x="274" y="222" width="52" height="22" rx="11" fill="#F7DF1E" fill-opacity="0.12" stroke="#F7DF1E" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="300" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#F7DF1E" font-weight="600">JS</text>
    </g>
    <!-- React pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1" dur="3s" fill="freeze"/>
      <rect x="334" y="222" width="58" height="22" rx="11" fill="#61DAFB" fill-opacity="0.1" stroke="#61DAFB" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="363" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#61DAFB" font-weight="600">React</text>
    </g>
    <!-- Node pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1" dur="3.2s" fill="freeze"/>
      <rect x="400" y="222" width="58" height="22" rx="11" fill="#339933" fill-opacity="0.1" stroke="#339933" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="429" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#6fcf6f" font-weight="600">Node</text>
    </g>
    <!-- MongoDB pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1" dur="3.4s" fill="freeze"/>
      <rect x="466" y="222" width="70" height="22" rx="11" fill="#47A248" fill-opacity="0.1" stroke="#47A248" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="501" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#6fcf6f" font-weight="600">MongoDB</text>
    </g>
    <!-- Java pill -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1" dur="3.6s" fill="freeze"/>
      <rect x="544" y="222" width="52" height="22" rx="11" fill="#ED8B00" fill-opacity="0.1" stroke="#ED8B00" stroke-width="0.8" stroke-opacity="0.6"/>
      <text x="570" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0a830" font-weight="600">Java</text>
    </g>

  </g>
</svg>
